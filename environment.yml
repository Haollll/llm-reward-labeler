name: llm-reward
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - gymnasium>=1.2,<1.3
    - mujoco==3.8.0
    - imageio==2.37.3
    - pillow==12.2.0
    - numpy==2.2.6
    - openai>=1.0
    - python-dotenv>=1.0
    - stable-baselines3>=2.7,<3
    - tqdm>=4.66
    - rich>=13.0
    - matplotlib==3.9.2
    - scipy==1.14.1
    - rl_zoo3>=2.8            # train PPO baselines (RL Baselines3 Zoo)

# Torch must be installed manually after `conda activate llm-reward`.
# Pick one based on the device you want the reward model to use:
#   CUDA 12.4:
#       pip install torch --index-url https://download.pytorch.org/whl/cu124
#   CPU only:
#       pip install torch --index-url https://download.pytorch.org/whl/cpu
#   macOS MPS:
#       pip install torch
