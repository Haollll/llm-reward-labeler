name: cse579
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    - gymnasium==1.3.0
    - mujoco==3.8.0
    - imageio==2.37.3
    - pillow==12.2.0
    - numpy==2.2.6
# torch must be installed manually after activating the env (command differs by machine):
#   CUDA:  pip install torch --index-url https://download.pytorch.org/whl/cu124
#   MPS:   pip install torch
#   CPU:   pip install torch --index-url https://download.pytorch.org/whl/cpu
